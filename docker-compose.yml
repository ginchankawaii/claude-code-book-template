# keiba 分析層を Docker で動かす。取得(JV-Link)は Windows 側で別途。
#
# 使い方:
#   1) 取得層(jrvltsql 等)が作った keiba.db を ./data/ に置く
#   2) 合成デモ:        docker compose run --rm keiba --days 360
#   3) 実データで解析:   docker compose run --rm keiba --db /data/keiba.db --exotic
#   4) 可視化:          docker compose run --rm --entrypoint python keiba \
#                          -m keiba.dashboard --out /app/plots
#   5) テスト:          docker compose run --rm --entrypoint python keiba -m pytest -q

services:
  keiba:
    build: .
    image: keiba-analysis
    volumes:
      - ./data:/data          # ここに keiba.db を置く(読み取り)
      - ./plots:/app/plots    # ダッシュボード PNG の出力先
    # 既定コマンド(引数を付けなければ合成デモ)
    command: ["--days", "360", "--quiet"]

  # 当日予想の Web ビューア:  docker compose up web  → http://localhost:8087
  # ポートを変えたい時: PowerShell で  $env:KEIBA_PORT=9123 ; docker compose up web
  web:
    build: .
    image: keiba-analysis
    entrypoint: ["python", "-m", "keiba.web"]
    command: ["--db", "/data/keiba.db", "--port", "8000"]
    environment:
      - PYTHONUNBUFFERED=1     # 学習中の進捗ログを即表示
    ports:
      - "${KEIBA_PORT:-8087}:8000"
    volumes:
      - ./data:/data
