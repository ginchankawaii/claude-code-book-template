# keiba 分析層を Docker で動かす。取得(JV-Link)は Windows 側で別途。
#
# ★ web は「取得層(realtime)が今まさに書いている本物の DB」を読み取り専用で直接読む。
#    既定マウント元 = ../jrvltsql/data (= 取得層が keiba.db を書くフォルダ)。
#    レイアウトが違う場合は環境変数 KEIBA_DB_DIR で上書き:
#       PowerShell:  $env:KEIBA_DB_DIR="C:\keiba_ateru\jrvltsql\data" ; docker compose up web
#    ※ Copy-Item で DB を複製しないこと(書き込み中の SQLite はページが破れて壊れる)。
#      直接 :ro マウント + --immutable なら元 DB を一切書かないので安全。
#
# 使い方:
#   1) 取得層(jrvltsql 等)が keiba.db を書き続ける(別途 Windows 側)
#   2) 合成デモ:        docker compose run --rm keiba --days 360
#   3) 実データで解析:   docker compose run --rm keiba --db /data/keiba.db --exotic
#   4) 可視化:          docker compose run --rm --entrypoint python keiba \
#                          -m keiba.dashboard --out /app/plots
#   5) テスト:          docker compose run --rm --entrypoint python keiba -m pytest -q

services:
  keiba:
    build: .
    image: keiba-analysis
    volumes:
      # web と同じく取得層の本物 DB を読み取り専用で読む(KEIBA_DB_DIR で上書き可)。
      # 実データ分析:  docker compose run --rm keiba --db /data/keiba.db --exotic --immutable
      - ${KEIBA_DB_DIR:-../jrvltsql/data}:/data:ro
      - ./plots:/app/plots    # ダッシュボード PNG の出力先
    # 既定コマンド(引数を付けなければ合成デモ)
    command: ["--days", "360", "--quiet"]

  # 当日予想の Web ビューア:  docker compose up web  → http://localhost:8087
  # ポートを変えたい時: PowerShell で  $env:KEIBA_PORT=9123 ; docker compose up web
  web:
    build: .
    image: keiba-analysis
    entrypoint: ["python", "-m", "keiba.web"]
    # --immutable: 取得層(realtime)が DB に書き込み中でも読めるよう immutable で開く
    # (排他ロックを無視して現時点のスナップショットを読む。書き込みはしないので安全)
    command: ["--db", "/data/keiba.db", "--port", "8000", "--immutable"]
    environment:
      - PYTHONUNBUFFERED=1     # 学習中の進捗ログを即表示
    ports:
      - "${KEIBA_PORT:-8087}:8000"
    volumes:
      # 取得層が書いている本物の DB を読み取り専用(:ro)で直接読む。
      # 既定 ../jrvltsql/data。別の場所なら KEIBA_DB_DIR で上書き。
      - ${KEIBA_DB_DIR:-../jrvltsql/data}:/data:ro
