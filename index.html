<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>ENCOR合格ストーリー 〜タキと目指す9月合格〜</title>
<meta name="theme-color" content="#c43d55">
<link rel="manifest" href="manifest.webmanifest">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="ENCOR">
<link rel="apple-touch-icon" href="icon-180.png">
<style>
  :root{
    --bg:#fbf4f0; --card:#ffffff; --ink:#3c322e; --sub:#93817a;
    --accent:#c43d55; --accent2:#8a5a2e; --line:#f0e2dc;
    --ok:#3aa675; --warn:#e09a3c;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html{-webkit-text-size-adjust:100%}
  body{font-family:"Hiragino Kaku Gothic ProN","Yu Gothic",Meiryo,sans-serif;background:var(--bg);color:var(--ink);line-height:1.6;
       padding:calc(12px + env(safe-area-inset-top)) calc(12px + env(safe-area-inset-right)) calc(24px + env(safe-area-inset-bottom)) calc(12px + env(safe-area-inset-left));
       max-width:960px;margin:0 auto}
  header{text-align:center;margin-bottom:14px}
  header h1{font-size:1.25rem;color:var(--accent)}
  header .sub{font-size:.78rem;color:var(--sub)}
  .topbar{display:flex;gap:8px;justify-content:center;flex-wrap:wrap;margin-top:10px}
  .badge{background:var(--card);border:1px solid var(--line);border-radius:20px;padding:5px 13px;font-size:.83rem;box-shadow:0 1px 4px rgba(0,0,0,.05)}
  .badge b{color:var(--accent)}
  .grid{display:grid;grid-template-columns:350px 1fr;gap:16px}
  @media(max-width:760px){.grid{grid-template-columns:1fr}}
  .card{background:var(--card);border:1px solid var(--line);border-radius:16px;padding:16px;box-shadow:0 2px 8px rgba(0,0,0,.05)}
  .card h2{font-size:.95rem;color:var(--accent2);margin-bottom:10px;border-bottom:2px dotted var(--line);padding-bottom:6px}

  /* キャラクター */
  .chara-wrap{text-align:center}
  #chara{filter:drop-shadow(0 4px 10px rgba(120,60,40,.15));max-width:100%;height:auto}
  .chara-name{font-weight:bold;font-size:1.05rem;margin-top:2px}
  .chara-name span{font-size:.72rem;color:var(--sub);font-weight:normal}
  .lovebar-wrap{margin:10px 0 4px}
  .lovebar-label{display:flex;justify-content:space-between;font-size:.8rem;color:var(--sub)}
  .lovebar{height:14px;background:#f5e4e0;border-radius:7px;overflow:hidden;margin-top:4px}
  .lovebar>div{height:100%;background:linear-gradient(90deg,#e88b74,#c43d55);border-radius:7px;transition:width .8s ease}
  .level-chip{display:inline-block;background:#f9e8e4;color:var(--accent);border-radius:14px;padding:2px 12px;font-size:.8rem;margin-top:6px}
  .bubble{position:relative;background:#fdf7f2;border:1.5px solid #ecd3c8;border-radius:14px;padding:12px 14px;margin-top:14px;font-size:.92rem;text-align:left;min-height:76px}
  .bubble::before{content:"";position:absolute;top:-10px;left:44px;border:10px solid transparent;border-bottom-color:#ecd3c8;border-top:0}
  .bubble::after{content:"";position:absolute;top:-8px;left:45px;border:9px solid transparent;border-bottom-color:#fdf7f2;border-top:0}
  .gain-pop{color:var(--accent);font-weight:bold;font-size:.85rem;text-align:center;height:1.4em;margin-top:6px;opacity:0;transition:opacity .4s}
  .gain-pop.show{opacity:1}

  /* 表情の切り替え */
  #chara .eyes-open,#chara .eyes-smug,#chara .sparkles,
  #chara .mouth-smirk,#chara .mouth-smile,#chara .mouth-grin,#chara .mouth-pout,
  #chara .brows-normal,#chara .brows-tsun,#chara .blush{display:none}
  #chara.exp-smug .eyes-smug,#chara.exp-smug .mouth-smirk,#chara.exp-smug .brows-normal{display:block}
  #chara.exp-dere .eyes-open,#chara.exp-dere .mouth-smile,#chara.exp-dere .brows-normal,#chara.exp-dere .blush{display:block}
  #chara.exp-excited .eyes-open,#chara.exp-excited .sparkles,#chara.exp-excited .mouth-grin,#chara.exp-excited .brows-normal,#chara.exp-excited .blush{display:block}
  #chara.exp-tsun .eyes-open,#chara.exp-tsun .mouth-pout,#chara.exp-tsun .brows-tsun,#chara.exp-tsun .blush{display:block}

  /* 統計 */
  .stats{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:12px}
  .stat{background:#fbf4ee;border-radius:10px;padding:8px;text-align:center}
  .stat .v{font-size:1.25rem;font-weight:bold;color:var(--accent2)}
  .stat .k{font-size:.68rem;color:var(--sub)}
  .phase-box{background:#f6efe4;border-radius:10px;padding:10px 12px;font-size:.85rem;margin-bottom:0}
  .phase-box b{color:var(--accent2)}

  /* フォーム */
  form label{display:block;font-size:.78rem;color:var(--sub);margin-top:8px}
  form input,form select,form textarea{width:100%;padding:9px;border:1px solid var(--line);border-radius:8px;font-size:16px;background:#fffdfc}
  .form-row{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px}
  button{cursor:pointer;border:none;border-radius:10px;padding:11px 16px;font-size:.95rem;font-weight:bold}
  .btn-main{background:var(--accent);color:#fff;width:100%;margin-top:12px}
  .btn-main:active{background:#a12f44}
  .btn-sub{background:#efe6e0;color:var(--ink);font-size:.8rem;padding:9px 12px}
  .btn-gold{background:linear-gradient(90deg,#e0a13c,#c43d55);color:#fff}
  .toolbar{display:flex;gap:8px;flex-wrap:wrap;justify-content:center;margin-top:16px}

  /* ログ */
  table{width:100%;border-collapse:collapse;font-size:.82rem}
  th,td{padding:6px 4px;border-bottom:1px solid var(--line);text-align:left}
  th{color:var(--sub);font-weight:normal;font-size:.75rem}
  td .del{background:none;color:#cbb0a4;font-size:.8rem;padding:2px 6px}
  td .del:active{color:var(--accent)}

  /* モーダル・エンディング */
  .overlay{position:fixed;inset:0;background:rgba(45,25,20,.55);display:none;align-items:center;justify-content:center;z-index:50;padding:16px}
  .overlay.show{display:flex}
  .modal{background:#fff;border-radius:18px;padding:24px;max-width:440px;width:100%;text-align:center;box-shadow:0 10px 40px rgba(0,0,0,.3);max-height:85vh;overflow-y:auto}
  .modal h3{color:var(--accent);margin-bottom:10px}
  .modal p{font-size:.92rem;text-align:left;white-space:pre-wrap}
  .ending .modal{background:linear-gradient(180deg,#fffaf5,#fdeee6)}
  .confetti{position:fixed;top:-20px;width:10px;height:14px;z-index:60;animation:fall linear forwards}
  @keyframes fall{to{transform:translateY(110vh) rotate(720deg)}}
</style>
</head>

<script>
'use strict';
const LS_KEY = 'encor-galge-v1';

/* ---------- 状態 ---------- */
let state = load();
function load(){
  try{
    const s = JSON.parse(localStorage.getItem(LS_KEY));
    if(s && Array.isArray(s.logs)) return s;
  }catch(e){}
  return { examDate:'2026-09-19', logs:[], passed:false, maxLevelSeen:1 };
}
function save(){ localStorage.setItem(LS_KEY, JSON.stringify(state)); }

/* ---------- 日付ユーティリティ ---------- */
const DAY = 86400000;
function todayStr(){ const d=new Date(); return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0'); }
function dnum(s){ return Math.round(Date.parse(s+'T00:00:00Z')/DAY); }
function dstr(n){ return new Date(n*DAY).toISOString().slice(0,10); }

/* ---------- 集計 ---------- */
function dailySummary(){
  const map = {};
  for(const l of state.logs){
    if(!map[l.date]) map[l.date] = {q:0,min:0,accSum:0,n:0};
    map[l.date].q += l.q; map[l.date].min += l.min;
    map[l.date].accSum += l.acc; map[l.date].n++;
  }
  return map;
}
function computeAffection(){
  const sum = dailySummary();
  const days = Object.keys(sum).sort();
  let pts = 0, streak = 0, prev = null;
  for(const d of days){
    streak = (prev !== null && dnum(d) - prev === 1) ? streak + 1 : 1;
    prev = dnum(d);
    const s = sum[d];
    let p = 1;
    if(s.min >= 30) p += 0.5;
    if(s.q >= 40) p += 0.5;
    if(s.n && s.accSum/s.n >= 80) p += 0.5;
    if(streak >= 7) p += 0.5;
    pts += p;
  }
  if(state.passed) return 100;
  return Math.min(100, Math.round(pts));
}
function computeStreak(){
  const days = new Set(Object.keys(dailySummary()));
  let t = dnum(todayStr());
  let streak = 0;
  // 今日まだ記録がなくても昨日から続いていれば継続扱い
  if(!days.has(todayStr())) t -= 1;
  while(true){
    if(days.has(dstr(t))){ streak++; t--; } else break;
  }
  return streak;
}
function weekStats(){
  const now = new Date();
  const dow = (now.getDay()+6)%7; // 月曜=0
  const monday = dnum(todayStr()) - dow;
  let days = new Set(), q = 0;
  for(const l of state.logs){
    const dn = dnum(l.date);
    if(dn >= monday && dn <= monday+6){ days.add(l.date); q += l.q; }
  }
  return {days:days.size, q};
}

const TIERS = [

  {min:60, lv:4, name:'かけがえのない相棒'},

  {min:20, lv:2, name:'共同研究者'},
  {min:0,  lv:1, name:'観察対象'},

/* ---------- フェーズ ---------- */
function phaseInfo(){
  const t = dnum(todayStr());
  if(t <= dnum('2026-08-02')) return {no:1, name:'銀メダル化', norma:'分野別二周目を1日30〜50問。今週の分野はdocs/study-plan.mdの表を確認。'};
  if(t <= dnum('2026-08-30')) return {no:2, name:'金メダル化', norma:'ミス問題中心に30〜50問+コマ問を1日10問。週末は苦手分野の解説読み込み。'};
  return {no:3, name:'仕上げ(模試+シミュ対策)', norma:'週末に模擬試験(時間を測る)+平日は復習とコマ問。Packet Tracerで手を動かす(docs/simulation.md)。目標: 模試85〜90%安定。'};
}

/* ---------- 表示 ---------- */
function pickTalk(){
  const aff = computeAffection();
  const tier = tierOf(aff);
  const days = Object.keys(dailySummary()).sort();
  if(!days.length){
    return {exp:'exp-smug', text:'タキ『やあ。キミが例の"CCNP受験者"だね?私は早瀬タキ。この検証ラボの主にして天才エンジニアだ。キミの合格、私が実験台に……いや、監修してあげるよ。まずは今日の勉強データを提出したまえ』'};
  }
  // 3日以上空いていたらツン(心配)モード
  const last = dnum(days[days.length-1]);
  if(dnum(todayStr()) - last >= 3){
    return {exp:'exp-tsun', text:'タキ『……ふーん、やっと来たんだ。何日空いたか、言ってあげようか?べ、別に数えてたわけじゃないけど!……10問でいいから、ほら、始めるよ』'};
  }
  if(state.passed) return {exp:'exp-excited', text:'タキ『合格者のキミ、今日も余裕の顔だね。フフ、いいことだ。下期はENARSI……次の実験も、私と一緒にやるに決まってるよね?』'};
  const pool = TALK[tier.lv];
  const exp = tier.lv >= 4 ? 'exp-dere' : 'exp-smug';
  return {exp: exp, text:'タキ『' + pool[Math.floor(Math.random()*pool.length)] + '』'};
}

function render(){
  const aff = computeAffection();
  const tier = tierOf(aff);
  const streak = computeStreak();
  const wk = weekStats();
  const totalQ = state.logs.reduce((a,l)=>a+l.q,0);
  const daysLeft = dnum(state.examDate) - dnum(todayStr());
  const ph = phaseInfo();

  document.getElementById('countdown').textContent = daysLeft >= 0 ? daysLeft : '済';
  document.getElementById('streak').textContent = streak;
  document.getElementById('phase-badge').innerHTML = 'フェーズ<b>' + ph.no + '</b> ' + ph.name;
  document.getElementById('love-num').textContent = aff + ' / 100';
  document.getElementById('love-fill').style.width = aff + '%';
  document.getElementById('level-chip').textContent = 'Lv.' + tier.lv + ' ' + tier.name;
  document.getElementById('wk-days').textContent = wk.days;
  document.getElementById('wk-q').textContent = wk.q;
  document.getElementById('total-q').textContent = totalQ;
  document.getElementById('phase-box').innerHTML = '<b>今のやること(フェーズ' + ph.no + ':' + ph.name + ')</b><br>' + ph.norma;

  const talk = pickTalk();
  document.getElementById('chara').setAttribute('class', talk.exp);
  document.getElementById('talk').textContent = talk.text;

  const tbody = document.getElementById('log-body');
  tbody.innerHTML = '';
  const recent = [...state.logs].sort((a,b)=>b.date.localeCompare(a.date)).slice(0,12);
  for(const l of recent){
    const tr = document.createElement('tr');
    const idx = state.logs.indexOf(l);
    tr.innerHTML = '<td>' + l.date.slice(5) + '</td><td>' + esc(l.cat.split(' ')[0]) + '</td><td>' + l.q + '</td><td>' + l.acc + '%</td><td>' + l.min + '</td>' +
      '<td><button class="del" data-i="' + idx + '">✕</button></td>';
    tbody.appendChild(tr);
  }
}
function esc(s){ const d=document.createElement('div'); d.textContent=s; return d.innerHTML; }

/* ---------- イベント ---------- */
function showEvent(ev, exp){
  document.getElementById('event-title').textContent = ev.title;
  document.getElementById('event-text').textContent = ev.text;
  document.getElementById('event-overlay').classList.add('show');
  document.getElementById('chara').setAttribute('class', exp || 'exp-excited');
}
function closeEvent(){ document.getElementById('event-overlay').classList.remove('show'); render(); }

document.getElementById('log-form').addEventListener('submit', function(e){
  e.preventDefault();
  const wasEmpty = state.logs.length === 0;
  const prevAff = computeAffection();
  const prevStreak = computeStreak();
  const log = {
    date: document.getElementById('f-date').value,
    cat: document.getElementById('f-cat').value,
    q: parseInt(document.getElementById('f-q').value)||0,
    acc: parseInt(document.getElementById('f-acc').value)||0,
    min: parseInt(document.getElementById('f-min').value)||0,
    memo: document.getElementById('f-memo').value,
  };
  // 3日以上ぶりの復帰か(追加前に判定)
  const days = Object.keys(dailySummary()).sort();
  const isComeback = days.length > 0 && (dnum(log.date) - dnum(days[days.length-1])) >= 3;

  state.logs.push(log);
  const aff = computeAffection();
  const streak = computeStreak();
  const tier = tierOf(aff);
  save();
  document.getElementById('f-memo').value = '';

  // 好感度上昇ポップ
  const gain = aff - prevAff;
  const pop = document.getElementById('gain-pop');
  pop.textContent = gain > 0 ? '💗 好感度 +' + gain : '💗 記録しました';
  pop.classList.add('show');
  setTimeout(()=>pop.classList.remove('show'), 2500);

  // イベント判定(優先順)
  if(wasEmpty){ showEvent(SPECIAL.firstLog, 'exp-smug'); }
  else if(tier.lv > (state.maxLevelSeen||1)){
    state.maxLevelSeen = tier.lv; save();
    showEvent(SPECIAL['levelup'+tier.lv], tier.lv >= 3 ? 'exp-dere' : 'exp-excited');
  }
  else if(prevStreak < 30 && streak >= 30){ showEvent(SPECIAL.streak30); }
  else if(prevStreak < 14 && streak >= 14){ showEvent(SPECIAL.streak14); }
  else if(prevStreak < 7 && streak >= 7){ showEvent(SPECIAL.streak7); }
  else if(isComeback){ showEvent(SPECIAL.comeback, 'exp-tsun'); }
  else {
    render();
    document.getElementById('chara').setAttribute('class','exp-excited');
    let msg = PRAISE[Math.floor(Math.random()*PRAISE.length)];
    if(log.acc > 0 && log.acc < 60) msg = '正答率が低い?フフ、慌てない慌てない。エラーログは成長の栄養素だ。解説を読み込みたまえ。キミならできると、データが言ってるよ。';
    if(log.acc >= 85) msg = 'せ、正答率' + log.acc + '%!?……ちょっとだけ、ほんのちょーっとだけ、すごいと思ってしまった……。き、今日だけだからね!';
    document.getElementById('talk').textContent = 'タキ『' + msg + '』';
  }
});

document.getElementById('log-body').addEventListener('click', function(e){
  const btn = e.target.closest('.del');
  if(!btn) return;
  if(confirm('この記録を削除しますか?')){
    state.logs.splice(parseInt(btn.dataset.i), 1);
    save(); render();
  }
});

document.getElementById('btn-pass').addEventListener('click', function(){
  if(!confirm('本当に合格しましたか?(おめでとうございます!!)')) return;
  state.passed = true; save();
  document.getElementById('ending-text').textContent = ENDING;
  document.getElementById('ending-overlay').classList.add('show');
  document.getElementById('chara').setAttribute('class','exp-excited');
  confetti();
  render();
});

document.getElementById('btn-exam').addEventListener('click', function(){
  const d = prompt('試験日を入力してください (例: 2026-09-19)', state.examDate);
  if(d && /^\d{4}-\d{2}-\d{2}$/.test(d)){ state.examDate = d; save(); render(); }
});

document.getElementById('btn-export').addEventListener('click', function(){
  const blob = new Blob([JSON.stringify(state, null, 2)], {type:'application/json'});
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = 'encor-study-backup.json';
  a.click();
});
document.getElementById('btn-import').addEventListener('click', ()=>document.getElementById('import-file').click());
document.getElementById('import-file').addEventListener('change', function(e){
  const f = e.target.files[0]; if(!f) return;
  const r = new FileReader();
  r.onload = ()=>{
    try{
      const s = JSON.parse(r.result);
      if(s && Array.isArray(s.logs)){ state = s; save(); render(); alert('読み込みました!'); }
      else alert('形式が違うようです');
    }catch(err){ alert('読み込みに失敗しました'); }
  };
  r.readAsText(f);
});

function confetti(){
  const colors = ['#c43d55','#e0a13c','#8a5be0','#3aa675','#f77b7b'];
  for(let i=0;i<80;i++){
    const c = document.createElement('div');
    c.className = 'confetti';
    c.style.left = Math.random()*100 + 'vw';
    c.style.background = colors[i%colors.length];
    c.style.animationDuration = (2+Math.random()*3) + 's';
    c.style.animationDelay = (Math.random()*1.5) + 's';
    document.body.appendChild(c);
    setTimeout(()=>c.remove(), 6000);
  }
}

/* ---------- PWA ---------- */
if('serviceWorker' in navigator && location.protocol === 'https:'){
  navigator.serviceWorker.register('./sw.js').catch(()=>{});
}

/* ---------- 初期化 ---------- */
document.getElementById('f-date').value = todayStr();
render();
